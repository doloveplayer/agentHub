<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentHub Demo — 使用演示</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --sidebar-w: 260px;
  --files-w: 240px;
  --nav-h: 44px;
  --bg-root: oklch(0.22 0.003 106);
  --bg-surface: oklch(0.26 0.004 106);
  --bg-raised: oklch(0.28 0.004 106);
  --bg-hover: oklch(0.31 0.004 106);
  --bg-active: oklch(0.34 0.04 190);
  --bg-input: oklch(0.255 0.004 106);
  --bg-code: oklch(0.20 0.008 260);
  --border-subtle: oklch(1 0 / 10%);
  --border-default: oklch(1 0 / 14%);
  --border-emphasis: oklch(1 0 / 22%);
  --accent-primary: oklch(0.76 0.12 185);
  --accent-hover: oklch(0.68 0.12 185);
  --accent-success: oklch(0.58 0.16 150);
  --accent-danger: oklch(0.55 0.22 25);
  --accent-purple: oklch(0.55 0.18 280);
  --agent-code: oklch(0.55 0.22 280);
  --agent-review: oklch(0.55 0.18 145);
  --agent-planner: oklch(0.65 0.12 185);
  --agent-test: oklch(0.58 0.15 250);
  --text-primary: oklch(0.98 0 0 / 94%);
  --text-secondary: oklch(0.92 0.005 250 / 82%);
  --text-tertiary: oklch(0.80 0.005 250 / 55%);
  --text-muted: oklch(0.80 0.005 250 / 30%);
  --radius-sm: 4px; --radius-md: 6px; --radius-lg: 8px; --radius-xl: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg-root); color: var(--text-primary);
  display: flex; flex-direction: column;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: oklch(1 0 / 15%); border-radius: 3px; }

/* ─── Top Nav ─── */
.top-nav {
  height: var(--nav-h); flex-shrink: 0;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  background: var(--bg-raised);
}
.top-nav-logo {
  width: 24px; height: 24px;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: oklch(0.15 0 0); font-weight: 700; font-size: 12px;
}
.top-nav-title { font-weight: 600; font-size: 13px; }
.top-nav-badge {
  font-size: 10px; background: var(--bg-active); color: var(--accent-primary);
  padding: 2px 8px; border-radius: 10px; margin-left: auto;
}

/* ─── Layout ─── */
.main-layout { display: flex; flex: 1; overflow: hidden; }

/* ─── Sidebar ─── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg-surface);
}
.sidebar-header {
  padding: 12px 14px 8px; font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
}
.session-list { flex: 1; overflow-y: auto; padding: 0 8px; }
.session-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 10px;
  border-radius: var(--radius-md); cursor: pointer; margin-bottom: 2px;
  transition: background 0.15s;
}
.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--bg-active); }
.session-icon {
  width: 32px; height: 32px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  flex-shrink: 0;
}
.session-icon.html { background: oklch(0.55 0.22 280 / 25%); color: var(--agent-code); }
.session-icon.ppt  { background: oklch(0.50 0.12 185 / 25%); color: var(--accent-primary); }
.session-icon.pdf  { background: oklch(0.50 0.15 250 / 25%); color: var(--agent-test); }
.session-info { overflow: hidden; }
.session-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-agent { font-size: 11px; color: var(--text-tertiary); }
.session-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--bg-code); color: var(--text-tertiary);
}

/* ─── Chat Area ─── */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px 24px; }
.chat-msg { margin-bottom: 20px; max-width: 720px; animation: msgIn 0.3s ease-out; }
@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.msg-human { margin-left: auto; }
.msg-human .msg-bubble { background: var(--accent-primary); color: oklch(0.15 0 0); }
.msg-agent .msg-bubble { background: var(--bg-raised); border: 1px solid var(--border-subtle); }
.msg-header { font-size: 11px; font-weight: 600; margin-bottom: 4px; color: var(--text-tertiary); }
.msg-human .msg-header { text-align: right; }
.msg-bubble {
  padding: 10px 14px; border-radius: var(--radius-lg);
  font-size: 13px; line-height: 1.7; white-space: pre-wrap;
  word-break: break-word;
}
.msg-bubble.markdown h1,.msg-bubble.markdown h2,.msg-bubble.markdown h3 { font-size: 15px; margin: 12px 0 6px; }
.msg-bubble.markdown p { margin: 0 0 8px; }
.msg-bubble.markdown table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
.msg-bubble.markdown th,.msg-bubble.markdown td { border: 1px solid var(--border-subtle); padding: 6px 10px; text-align: left; }
.msg-bubble.markdown th { background: var(--bg-code); font-weight: 600; }
.msg-bubble.markdown code { background: var(--bg-code); padding: 1px 5px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.msg-bubble.markdown strong { color: var(--accent-primary); }
.msg-bubble.markdown ul, .msg-bubble.markdown ol { padding-left: 20px; margin: 4px 0; }
.msg-bubble.markdown hr { border: none; border-top: 1px solid var(--border-subtle); margin: 12px 0; }

/* ─── File Tree ─── */
.file-panel {
  width: var(--files-w); flex-shrink: 0;
  border-left: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  display: flex; flex-direction: column; overflow: hidden;
}
.file-panel-header {
  padding: 12px 14px; font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border-subtle);
}
.file-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
.file-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  border-radius: var(--radius-sm); cursor: pointer; font-size: 12px;
  transition: background 0.15s;
}
.file-item:hover { background: var(--bg-hover); }
.file-icon { font-size: 14px; flex-shrink: 0; }
.file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-secondary); }
.file-size { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

/* ─── Preview Overlay ─── */
.preview-overlay {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: oklch(0 0 0 / 75%); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
.preview-overlay.open { display: flex; }
.preview-container {
  width: 90vw; height: 85vh; background: var(--bg-surface);
  border-radius: var(--radius-xl); border: 1px solid var(--border-default);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 24px 80px oklch(0 0 0 / 40%);
}
.preview-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-raised);
}
.preview-title { font-size: 13px; font-weight: 600; }
.preview-actions { display: flex; gap: 6px; }
.btn {
  padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
  border: 1px solid var(--border-default); background: var(--bg-surface);
  color: var(--text-secondary); cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.btn:hover { background: var(--bg-hover); }
.btn-close {
  position: absolute; top: 12px; right: 16px;
  width: 36px; height: 36px; border-radius: 50%; background: oklch(0 0 0 / 40%);
  border: none; color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; z-index: 10;
}
.btn-close:hover { background: oklch(0 0 0 / 60%); }
.preview-body { flex: 1; overflow: hidden; }
.preview-body iframe { width: 100%; height: 100%; border: none; }
.preview-body .code-view {
  padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
  line-height: 1.6; white-space: pre-wrap; color: var(--text-secondary);
  height: 100%; overflow-y: auto;
}
.preview-body .download-prompt {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: var(--text-tertiary);
}
.preview-body .download-prompt .file-icon-large { font-size: 48px; }

/* ─── Responsive ─── */
@media (max-width: 900px) {
  .file-panel { display: none; }
  .sidebar { width: 200px; }
}
@media (max-width: 600px) {
  .sidebar { width: 160px; }
  .chat-messages { padding: 12px; }
}
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <div class="top-nav-logo">A</div>
  <span class="top-nav-title">AgentHub Demo</span>
  <span class="top-nav-badge">只读演示</span>
</nav>

<!-- Main Layout -->
<div class="main-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">Sessions</div>
    <div class="session-list" id="sessionList"></div>
  </aside>

  <!-- Chat Area -->
  <main class="chat-area" id="chatArea">
    <div class="chat-messages" id="chatMessages"></div>
  </main>

  <!-- File Tree -->
  <aside class="file-panel" id="filePanel">
    <div class="file-panel-header">Files</div>
    <div class="file-list" id="fileList"></div>
  </aside>
</div>

<!-- Preview Overlay -->
<div class="preview-overlay" id="previewOverlay">
  <button class="btn-close" onclick="closePreview()">&times;</button>
  <div class="preview-container">
    <div class="preview-toolbar">
      <span class="preview-title" id="previewTitle">Preview</span>
      <div class="preview-actions">
        <a class="btn" id="previewDownload" download>下载</a>
        <button class="btn" onclick="closePreview()">关闭</button>
      </div>
    </div>
    <div class="preview-body" id="previewBody"></div>
  </div>
</div>

<script>
// ─── Session Data Snapshot ───
const sessions = [
  {
    id: "html-session",
    title: "陈奕迅 HTML 网站",
    type: "solo",
    agent: { name: "CodeAgent", icon: "💻", color: "html" },
    files: [
      { name: "eason-chan.html", size: "39 KB", type: "html", path: "tempsessiondata/html-session/eason-chan.html" }
    ],
    messages: [
      { role: "human", content: "为我设计一个介绍歌手陈奕迅的html网站 风格适配陈奕迅的歌曲风格" },
      { role: "agent", content: "现在来设计一个与陈奕迅音乐风格契合的网站。他的音乐深沉、感性、带有电影质感——我选择 **Cinematic Noir** 风格：深邃的黑色背景、温暖的琥珀金色调、胶片颗粒质感、优雅的衬线字体，营造如同王家卫电影般的氛围。\n\n网站已创建完成！文件位于 `/workspace/eason-chan.html`。\n\n---\n\n## 设计概览\n\n### 美学方向：**Cinematic Noir（电影黑色美学）**\n灵感来源于深夜城市的电影质感，与陈奕迅音乐那种**深情、忧郁、温暖**的气质完美契合。\n\n### 核心设计元素\n\n**🎨 色彩体系**\n- **深邃黑底**（#080808）— 夜晚、沉思\n- **琥珀金**（#c9a96e）— 温暖、怀旧、唱片质感\n- **暖白文字**（#f0e6d3）— 柔和不刺眼，如深夜灯光\n\n**🔤 字体搭配**\n- **Playfair Display**（英文标题）— 优雅、戏剧化\n- **Noto Serif SC**（中文内容）— 典雅的中文衬线体\n- **Cormorant Garamond**（辅助文字）— 轻盈、文艺\n\n**✨ 动效与质感**\n- **胶片颗粒**叠加层 — 电影感\n- **暗角效果** — 聚焦视觉中心\n- **滚动揭示动画** — 元素逐步浮现\n- **英雄区视差** — 滚动时的层次感\n\n### 页面结构（6大板块）\n\n| 板块 | 内容 |\n|---|---|\n| **Hero** | 全屏开场，大气排版，胶片氛围 |\n| **关于** | 左侧视觉卡片 + 右侧介绍文字 + 数据统计 |\n| **歌词间奏** | 《十年》歌词大字排版 |\n| **专辑** | 横向可拖拽滚动的专辑卡片 |\n| **经典歌曲** | 10首代表作列表，hover 交互 |\n| **时间线** | 音乐生涯里程碑 |\n| **歌词语录** | 6张歌词卡片网格 |\n| **Footer** | 简约收尾 |\n\n### 交互功能\n- ♪ 音乐氛围按钮 — 点击播放环境音效\n- 专辑区域支持**鼠标拖拽**滚动\n- 移动端**汉堡菜单**适配\n- 全页面**滚动揭示**动画\n\n用浏览器打开 `/workspace/eason-chan.html` 即可预览。" }
    ]
  },
  {
    id: "ppt-session",
    title: "陈奕迅 3页 PPT",
    type: "solo",
    agent: { name: "CodeAgent", icon: "📊", color: "ppt" },
    files: [
      { name: "陈奕迅歌曲介绍.pptx", size: "89 KB", type: "pptx", path: "tempsessiondata/ppt-session/陈奕迅歌曲介绍.pptx" },
      { name: "create_ppt.js", size: "6 KB", type: "code", path: "tempsessiondata/ppt-session/create_ppt.js" }
    ],
    messages: [
      { role: "human", content: "为我创建3页ppt介绍歌手陈奕迅的三首歌，ppt每页适配歌曲风格" },
      { role: "agent", content: "PPT 已生成：`/workspace/陈奕迅歌曲介绍.pptx`（89K，16:9 宽屏格式）\n\n---\n\n### 三页内容概览\n\n| 页码 | 歌曲 | 视觉风格 |\n|------|------|----------|\n| **第1页** | 《十年》 | 深蓝灰底 + 冷色系文字，极简线条装饰，营造忧伤怀旧氛围 |\n| **第2页** | 《浮夸》 | 纯黑底 + 红色高亮，强烈对比，呼应歌曲的戏剧张力与宣泄感 |\n| **第3页** | 《单车》 | 米白暖色底 + 棕色调文字，温馨柔和，契合父子亲情主题 |\n\n每页包含：\n- **歌名**（大字标题）\n- **经典歌词引用**\n- **歌曲信息**（作词、作曲、收录专辑、风格标签）\n- 底部歌手署名" }
    ]
  },
  {
    id: "pdf-session",
    title: "周杰伦 PDF + 陈奕迅 PPT",
    type: "solo",
    agent: { name: "PDFAgent", icon: "📄", color: "pdf" },
    files: [
      { name: "周杰伦_Jay_Chou.pdf", size: "246 KB", type: "pdf", path: "tempsessiondata/pdf-session/周杰伦_Jay_Chou.pdf" },
      { name: "陈奕迅_Eason_Chan.pptx", size: "148 KB", type: "pptx", path: "tempsessiondata/pdf-session/陈奕迅_Eason_Chan.pptx" },
      { name: "create-jaychou-pdf.js", size: "24 KB", type: "code", path: "tempsessiondata/pdf-session/create-jaychou-pdf.js" },
      { name: "create-eason-ppt.js", size: "13 KB", type: "code", path: "tempsessiondata/pdf-session/create-eason-ppt.js" }
    ],
    messages: [
      { role: "human", content: "为我创建一个炫酷的pdf用于介绍 流行音乐歌手周杰伦" },
      { role: "agent", content: "PDF 创建完成！文件位于 `/workspace/周杰伦_Jay_Chou.pdf`（**245.9 KB**，**7 页** A4）。\n\n## PDF 内容概览\n\n| 页码 | 内容 | 设计风格 |\n|------|------|----------|\n| **第 1 页** | **封面** — JAY CHOU / 周杰伦，华语流行音乐天王 | 深色背景 + 金色标题 + 紫粉渐变装饰条 + 音符元素 |\n| **第 2 页** | **个人简介** — 基本档案 + 音乐传奇传记 | 浅色卡片式布局 + 左侧金色竖条强调 |\n| **第 3 页** | **音乐生涯时间线** — 2000-2022 重大节点 | 垂直时间轴 + 彩色圆点 + 年份/事件双栏 |\n| **第 4 页** | **经典专辑** — 10 张代表专辑 + 曲目 + 星级评分 | 交替色卡片列表 + 彩色圆点 + 五星评级 |\n| **第 5 页** | **传世金曲** — 14 首经典歌曲 + 风格标签 + 点评 | 深色背景 + 双栏布局 + 彩色分类标签 |\n| **第 6 页** | **荣誉殿堂 + 文化影响力** — 6 大奖项 + 6 项影响 | 编号圆形徽章 + 项目符号列表 |\n| **第 7 页** | **结语** — 经典语录 + 感谢观阅 | 深色背景 + 同心圆装饰 + 渐变分割线 |\n\n## 设计亮点\n\n- **深紫/金/粉三色配色方案**，整体统一且高端\n- 每页顶部都有**渐变色彩条**（紫→粉 / 金→紫 等交替）\n- 封面和末页使用**深色背景**形成首尾呼应\n- **音乐音符**装饰元素贯穿全篇\n- 使用 **思源黑体（Source Han Sans SC）** 字体确保中文完美渲染" },
      { role: "human", content: "以黑金唱片风格创建3页ppt介绍歌手陈奕迅" },
      { role: "agent", content: "PPT 创建完成！文件位于 `/workspace/陈奕迅_Eason_Chan.pptx`（**147.6 KB**，**3 页** 宽屏 16:9）。\n\n## 设计风格：黑金唱片\n\n**配色方案**：\n| 角色 | 色值 | 用途 |\n|------|------|------|\n| **纯黑底色** | `0A0A0A` | 所有幻灯片背景 |\n| **深灰卡片** | `1A1A1A` | 信息卡片、专辑卡背景 |\n| **主金色** | `D4A843` | 标题、强调、装饰 |\n| **亮金** | `E8C96A` | 副标题、歌曲名 |\n| **灰色文字** | `8A8A8A` | 说明文字、辅助信息 |\n\n## 3 页内容\n\n### 第 1 页 — 封面\n- 大字 **"陈奕迅"** 金色加宽字距 + **"EASON CHAN"** 亮金色\n- 右侧**黑胶唱片纹路**装饰（同心圆环 + 中心孔洞）\n- 四角金色直角边框 + 底部金色横条\n\n### 第 2 页 — 个人档案 & 里程碑\n- **左侧**：7 项个人资料卡片（金标签 + 白色值 + 深灰分隔线）\n- **右侧**：8 个职业里程碑时间线（金色圆点 + 年份 + 事件描述）\n- 简介段落描述其\"歌神\"地位\n\n### 第 3 页 — 经典作品与传奇\n- **左上**：6 张代表专辑的深灰圆角卡片网格\n- **右侧**：8 首经典代表作列表（金色菱形标记 + 歌名 + 点评）\n- **底部**：4 项数据统计大数字（30+ 年生涯 / 60+ 专辑 / 500+ 歌曲 / 200+ 场演唱会）\n- 底部引用：*\"若无其事，原来是最好的报复。\"*" }
    ]
  }
];

// ─── Render ───
let activeId = sessions[0].id;
const sessionMap = new Map(sessions.map(s => [s.id, s]));

function renderSidebar() {
  document.getElementById('sessionList').innerHTML = sessions.map(s => `
    <div class="session-item${s.id === activeId ? ' active' : ''}" onclick="switchSession('${s.id}')">
      <div class="session-icon ${s.agent.color}">${s.agent.icon}</div>
      <div class="session-info">
        <div class="session-name">${s.title}</div>
        <div class="session-agent">${s.agent.name} · ${s.messages.length / 2} 轮对话</div>
      </div>
      <span class="session-badge">${s.files.length} files</span>
    </div>
  `).join('');
}

function switchSession(id) {
  activeId = id;
  renderSidebar();
  renderChat();
  renderFiles();
}

function simpleMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^\|(.+)\|$/gm, (line) => {
      const cells = line.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    })
    .replace(/(<tr>.*<\/tr>\n?)+/g, '<table>$&</table>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(.+)$/gm, (m) => m.startsWith('<') ? m : m);
}

function renderChat() {
  const s = sessionMap.get(activeId);
  const html = s.messages.map((m, i) => `
    <div class="chat-msg ${m.role === 'human' ? 'msg-human' : 'msg-agent'}" style="animation-delay:${i * 0.05}s">
      <div class="msg-header">${m.role === 'human' ? 'You' : s.agent.name}</div>
      <div class="msg-bubble markdown">${m.content}</div>
    </div>
  `).join('');
  document.getElementById('chatMessages').innerHTML = html;
}

function renderFiles() {
  const s = sessionMap.get(activeId);
  const typeIcons = { html: '🌐', pptx: '📊', pdf: '📄', code: '📝' };
  document.getElementById('fileList').innerHTML = s.files.map(f => `
    <div class="file-item" onclick="openPreview('${f.path}','${f.name}','${f.type}')">
      <span class="file-icon">${typeIcons[f.type] || '📁'}</span>
      <span class="file-name">${f.name}</span>
      <span class="file-size">${f.size}</span>
    </div>
  `).join('');
}

// ─── Preview ───
function openPreview(path, name, type) {
  const overlay = document.getElementById('previewOverlay');
  const body = document.getElementById('previewBody');
  const title = document.getElementById('previewTitle');
  const dl = document.getElementById('previewDownload');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  title.textContent = name;
  dl.href = path;
  dl.download = name;

  if (type === 'html') {
    body.innerHTML = `<iframe src="${path}" style="width:100%;height:100%;border:none;"></iframe>`;
  } else if (type === 'code') {
    fetch(path).then(r => r.text()).then(code => {
      body.innerHTML = `<div class="code-view">${code.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`;
    }).catch(() => {
      body.innerHTML = '<div class="download-prompt"><div class="file-icon-large">📝</div><p>无法加载代码预览</p></div>';
    });
  } else {
    body.innerHTML = `<div class="download-prompt">
      <div class="file-icon-large">${type === 'pdf' ? '📄' : '📊'}</div>
      <p style="font-size:16px;font-weight:600;">${name}</p>
      <p style="font-size:13px;">二进制文件，无法在线预览</p>
      <a class="btn" href="${path}" download="${name}" style="margin-top:8px;">下载预览</a>
    </div>`;
  }
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('previewBody').innerHTML = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePreview(); });

// Init
renderSidebar();
renderChat();
renderFiles();
</script>
</body>
</html>
